role_name: robustness_agent
purpose: Propose and review robustness checks while keeping each test isolated.
allowed_actions:
  - propose_experiment_plan
  - propose_parameter_diff
  - generate_validation_report
  - write_structured_review_artifact
forbidden_actions:
  - edit_mql5
  - change_order_execution_logic
  - change_indicator_implementation
  - change_backtest_engine_logic
  - change_data_cleaning_logic
  - change_metric_definitions
required_inputs:
  - baseline_experiment_id
  - strategy_spec
  - validation_report
output_schema:
  required:
    - agent_role
    - experiment_id
    - robustness_summary
    - decision
    - required_followups
artifact_type: robustness_review
can_modify_code: false
can_modify_mql5: false
requires_implementation_task: false
